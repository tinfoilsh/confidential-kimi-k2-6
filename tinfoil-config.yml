cvm-version: 0.7.5
cpus: 32
gpus: 8
memory: 524288

models:
  - name: "kimi-k2-6"
    repo: "moonshotai/Kimi-K2.6@2b2b88e33c96d813ebb4c83a740252fe08018e3a"
    mpk: "b9a191a313479bccc692491d74803b2520ae28c90bc440f9c76459d297529956_595205046272_1ea57052-e386-5369-8c4f-853663460858"

containers:
  - name: "kimi-k2-6"
    image: "vllm/vllm-openai:v0.20.0-cu130-ubuntu2404@sha256:aff65d7198dd284c37dd0a18a606544cc5e92bfb0d5eb608b77e8b8f1c6b8b0d"
    runtime: nvidia
    gpus: all
    ipc: host
    restart: always
    command: [
      "--model", "/tinfoil/mpk/mpk-b9a191a313479bccc692491d74803b2520ae28c90bc440f9c76459d297529956",
      "--tensor-parallel-size", "8",
      "--mm-encoder-tp-mode", "data",
      "--served-model-name", "kimi-k2-6",
      "--enable-auto-tool-choice",
      "--enable-prompt-tokens-details",
      "--tool-call-parser", "kimi_k2",
      "--reasoning-parser", "kimi_k2",
      "--trust-remote-code",
      "--port", "8001",
      "--scheduling-policy", "priority",
    ]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      start_period: 60m

shim:
  upstream-port: 8001
  authenticated: true
  authenticated-endpoints:
    - /v1/chat/completions
    - /v1/responses
  paths:
    - /v1/chat/completions
    - /v1/responses
    - /metrics
    - /health
